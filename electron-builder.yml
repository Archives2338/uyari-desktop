# Empaquetado macOS. Para distribuir de verdad falta: cuenta Apple Developer
# ($99/año), firma Developer ID y notarización (ver README §Distribución).
appId: com.uyari.desktop
productName: Uyari
directories:
  output: dist
files:
  - out/**
  - package.json
extraResources:
  # Helper Swift de captura de audio del sistema (Core Audio process tap).
  # Compilar antes con: npm run build:helper
  - from: native/bin/uyari-audio-helper
    to: uyari-audio-helper
mac:
  category: public.app-category.productivity
  icon: resources/icon.png
  target:
    - dmg
  extendInfo:
    NSMicrophoneUsageDescription: Uyari uses the microphone to capture your side of the meeting.
    NSAudioCaptureUsageDescription: Uyari captures meeting audio to transcribe it.
